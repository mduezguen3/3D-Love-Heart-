<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Heart for You 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:radial-gradient(ellipse at center, #1a0033 0%, #0d001a 70%, #000010 100%);
    overflow:hidden;
    font-family:'Lato',sans-serif;
  }

  /* ── Canvas 3D scene ── */
  #canvas3d{
    position:fixed;inset:0;
    display:block;
  }

  /* ── Flashing text ── */
  #msg-overlay{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    pointer-events:none;
    z-index:10;
  }
  #flash-text{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.4rem,4vw,2.6rem);
    font-style:italic;
    color:white;
    text-align:center;
    padding:0 2rem;
    text-shadow:
      0 0 20px rgba(255,100,200,1),
      0 0 60px rgba(220,80,180,.7),
      0 0 120px rgba(180,60,220,.5);
    opacity:0;
    transition:opacity .5s ease;
    max-width:600px;
    line-height:1.45;
  }
  #flash-text.show{opacity:1;}

  #sub-text{
    font-size:clamp(.85rem,2vw,1.1rem);
    color:rgba(255,200,240,.6);
    margin-top:.8rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:0;
    transition:opacity .5s ease .2s;
    font-weight:300;
  }
  #sub-text.show{opacity:1;}

  /* ── Confetti ── */
  .confetti{
    position:fixed;
    pointer-events:none;
    z-index:5;
    border-radius:2px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
  }

  /* ── Sparkle dots ── */
  .sparkle{
    position:fixed;
    pointer-events:none;
    z-index:6;
    border-radius:50%;
    animation:sparklePop ease-out forwards;
  }
  @keyframes sparklePop{
    0%{transform:scale(0);opacity:1;}
    60%{transform:scale(1.4);opacity:.9;}
    100%{transform:scale(0);opacity:0;}
  }

  /* ── Floating mini hearts ── */
  .mini-heart{
    position:fixed;
    pointer-events:none;
    z-index:6;
    font-size:1.2rem;
    animation:miniFloat ease-out forwards;
  }
  @keyframes miniFloat{
    0%{transform:translateY(0) scale(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(-140px) scale(1) rotate(30deg);opacity:0;}
  }

  /* ── Bottom label ── */
  #bottom-label{
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
    font-size:.82rem;
    color:rgba(200,150,230,.45);
    letter-spacing:.12em;
    text-transform:uppercase;
    z-index:20;
    pointer-events:none;
  }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div id="msg-overlay">
  <div id="flash-text"></div>
  <div id="sub-text"></div>
</div>

<div id="bottom-label">✦ tap anywhere for magic ✦</div>

<script>
// ════════════════════════════════════════════
//  3D HEART  via Canvas 2D perspective math
// ════════════════════════════════════════════
const canvas = document.getElementById('canvas3d');
const ctx    = canvas.getContext('2d');

let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Heart parametric surface
function heartPoint(u, v){
  // u: 0..2π  v: 0..2π
  const sinV = Math.sin(v), cosV = Math.cos(v);
  const sinV3= sinV**3;
  const x = 16*sinV3;
  const y = 13*cosV - 5*Math.cos(2*v) - 2*Math.cos(3*v) - Math.cos(4*v);
  const z = 0;  // flat; we project
  // but let's use a surface parametrization:
  // wrap around cylindrically
  const r = (16*sinV3)*0.06;
  const px = r * Math.cos(u);
  const py = -(13*cosV - 5*Math.cos(2*v) - 2*Math.cos(3*v) - Math.cos(4*v))*0.06;
  const pz = r * Math.sin(u);
  return [px, py, pz];
}

// Build points
const RINGS = 36, ROWS = 36;
let points3d = [];
for(let i=0;i<ROWS;i++){
  for(let j=0;j<RINGS;j++){
    const v = (i/ROWS)*Math.PI*2;
    const u = (j/RINGS)*Math.PI*2;
    points3d.push(heartPoint(u,v));
  }
}

let rotX=0.3, rotY=0, rotZ=0;
let autoRotY=0;
let scale = Math.min(W,H)*1.1;
let mouseX=0, mouseY=0, dragging=false, lastMX=0, lastMY=0;

canvas.addEventListener('mousedown', e=>{ dragging=true; lastMX=e.clientX; lastMY=e.clientY; });
window.addEventListener('mouseup', ()=>dragging=false);
canvas.addEventListener('mousemove', e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  if(dragging){
    rotY+=(e.clientX-lastMX)*.01;
    rotX+=(e.clientY-lastMY)*.005;
    lastMX=e.clientX; lastMY=e.clientY;
  }
});
canvas.addEventListener('touchstart',e=>{ const t=e.touches[0]; lastMX=t.clientX; lastMY=t.clientY; dragging=true; });
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0]; rotY+=(t.clientX-lastMX)*.012; rotX+=(t.clientY-lastMY)*.006; lastMX=t.clientX; lastMY=t.clientY; },{passive:false});
canvas.addEventListener('touchend', ()=>dragging=false);

function project([x,y,z]){
  // rotate X
  const cosX=Math.cos(rotX), sinX=Math.sin(rotX);
  const y1=y*cosX-z*sinX, z1=y*sinX+z*cosX;
  // rotate Y
  const cosY=Math.cos(rotY+autoRotY), sinY=Math.sin(rotY+autoRotY);
  const x2=x*cosY+z1*sinY, z2=-x*sinY+z1*cosY;
  // perspective
  const fov=2.8, d=fov/(fov+z2);
  return [W/2+x2*scale*d, H/2+y1*scale*d, z2, d];
}

const colors=[
  '#ff4fa3','#ff6eb4','#ff90c6','#e040fb','#ce93d8',
  '#f48fb1','#ff80ab','#ea80fc','#ff6090','#c51162'
];

function draw(){
  ctx.clearRect(0,0,W,H);

  // project all
  const proj = points3d.map(p=>project(p));

  // draw edges lightly
  for(let i=0;i<ROWS;i++){
    for(let j=0;j<RINGS;j++){
      const idx=i*RINGS+j;
      const nj=(j+1)%RINGS, ni=(i+1)%ROWS;
      const [x1,y1,z1,d1]=proj[idx];
      const [x2,y2,z2,d2]=proj[i*RINGS+nj];
      const [x3,y3,z3,d3]=proj[ni*RINGS+j];

      // brightness from z
      const bright=Math.min(1,Math.max(0,(z1+0.8)*0.6+0.1));
      const col=`rgba(255,${80+Math.floor(bright*100)},${160+Math.floor(bright*80)},${bright*.7})`;

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.strokeStyle=col;
      ctx.lineWidth=d1*1.2;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x3,y3);
      ctx.strokeStyle=col;
      ctx.stroke();
    }
  }

  // Glow overlay – soft heart halo
  const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.min(W,H)*.38);
  grd.addColorStop(0,'rgba(255,80,160,.09)');
  grd.addColorStop(.6,'rgba(180,50,220,.05)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);
}

// ── Ambient floating sparkles ──
function spawnAmbient(){
  if(Math.random()<.12) spawnSparkle(
    W/2+(Math.random()-.5)*Math.min(W,H)*.4,
    H/2+(Math.random()-.5)*Math.min(W,H)*.4
  );
  if(Math.random()<.06) spawnMiniHeart(
    W/2+(Math.random()-.5)*Math.min(W,H)*.35,
    H/2+(Math.random()-.5)*Math.min(W,H)*.35*.6+Math.min(W,H)*.08
  );
}

let lastTime=0;
function loop(t){
  const dt=t-lastTime; lastTime=t;
  autoRotY+=.006;
  draw();
  spawnAmbient();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ════════════════════════════════════════════
//  FLASHING TEXT
// ════════════════════════════════════════════
const messages=[
  {main:"You are the most amazing person I have ever known.",sub:"— and I fall more in love every single day"},
  {main:"I want to share my entire life with you.",sub:"— every moment, every adventure, forever"},
  {main:"You make my heart feel things I didn't know were possible.",sub:"— thank you for existing"},
  {main:"The way you smile is my favorite thing in the world.",sub:"— it lights up everything"},
  {main:"Being loved by you is the greatest gift of my life.",sub:"— I don't take a single second for granted"},
  {main:"You are brilliant, kind, and breathtakingly beautiful.",sub:"— inside and out"},
  {main:"Home isn't a place. Home is wherever you are.",sub:"— and I want to be home forever"},
  {main:"I chose you. I choose you. I will always choose you.",sub:"— in every lifetime, every universe"},
  {main:"You are the poem I never knew how to write.",sub:"— and the story I always wanted to live"},
  {main:"My heart has been yours since the moment I met you.",sub:"— it always will be"},
];

let msgIdx=0;
const flashEl=document.getElementById('flash-text');
const subEl=document.getElementById('sub-text');

function showNextMsg(){
  flashEl.classList.remove('show'); subEl.classList.remove('show');
  setTimeout(()=>{
    const m=messages[msgIdx%messages.length]; msgIdx++;
    flashEl.textContent=m.main;
    subEl.textContent=m.sub;
    flashEl.classList.add('show'); subEl.classList.add('show');
    // burst confetti on each new message
    burstConfetti(20);
  },600);
}
setInterval(showNextMsg, 4200);
setTimeout(showNextMsg, 800);

// ════════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════════
const confettiColors=['#ff80ab','#ea80fc','#f48fb1','#ce93d8','#ffe0f0','#ffffff','#ff4fa3','#e040fb'];
function spawnConfetti(x,y){
  const el=document.createElement('div');
  el.className='confetti';
  const sz=Math.random()*8+4;
  el.style.cssText=`
    left:${x}px;top:${y}px;
    width:${sz}px;height:${sz*1.4}px;
    background:${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
    opacity:${.7+Math.random()*.3};
    animation-duration:${1.4+Math.random()*1.8}s;
    animation-delay:${Math.random()*.3}s;
    transform-origin:center;
  `;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function burstConfetti(n, cx, cy){
  const bx=cx||W/2+(Math.random()-.5)*300;
  const by=cy||H/2+(Math.random()-.5)*200;
  for(let i=0;i<n;i++) setTimeout(()=>spawnConfetti(bx+(Math.random()-.5)*220, by+(Math.random()-.5)*100),i*25);
}

// ════════════════════════════════════════════
//  SPARKLES
// ════════════════════════════════════════════
function spawnSparkle(x,y){
  const el=document.createElement('div');
  el.className='sparkle';
  const sz=Math.random()*10+4;
  const hue=Math.floor(Math.random()*60)+290;
  el.style.cssText=`
    left:${x-sz/2}px;top:${y-sz/2}px;
    width:${sz}px;height:${sz}px;
    background:hsl(${hue},100%,80%);
    box-shadow:0 0 ${sz*2}px hsl(${hue},100%,70%);
    animation-duration:${.8+Math.random()*.6}s;
  `;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}
function spawnMiniHeart(x,y){
  const el=document.createElement('div');
  el.className='mini-heart';
  el.textContent=['💖','💕','💗','💜','🌸','✨'][Math.floor(Math.random()*6)];
  el.style.cssText=`left:${x}px;top:${y}px;animation-duration:${1.4+Math.random()*1}s;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

// ── Click burst ──
canvas.addEventListener('click',e=>{
  burstConfetti(38, e.clientX, e.clientY);
  for(let i=0;i<12;i++) setTimeout(()=>{
    spawnSparkle(e.clientX+(Math.random()-.5)*100,e.clientY+(Math.random()-.5)*100);
    spawnMiniHeart(e.clientX+(Math.random()-.5)*80,e.clientY+(Math.random()-.5)*80);
  },i*40);
});
canvas.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  burstConfetti(28,t.clientX,t.clientY);
});
</script>
</body>
</html>
